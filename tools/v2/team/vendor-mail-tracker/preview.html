<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Mail Tracker — Local Preview</title>

    <!--
      Standalone preview for the Vendor Mail Tracker tool.
      This page is NOT part of the main Stealth Mail app.
      It is for folder-local review only.

      Design tokens and font stack replicated from the main app's
      src/features/design-system/styles/ — no shared CSS files are imported.
      See docs/component-style-guide.md for the full token reference.
    -->

    <!-- Fonts (same sources as the main app) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Design token replication ──────────────────────────────────────── */
      :root {
        --radius: 0.875rem;
        --background: oklch(0.18 0.005 270);
        --foreground: oklch(0.96 0.005 270);
        --card: oklch(0.22 0.006 270);
        --card-foreground: oklch(0.96 0.005 270);
        --primary: oklch(0.95 0.005 270);
        --primary-foreground: oklch(0.18 0.005 270);
        --secondary: oklch(0.27 0.006 270);
        --secondary-foreground: oklch(0.96 0.005 270);
        --muted: oklch(0.25 0.006 270);
        --muted-foreground: oklch(0.7 0.01 270);
        --accent: oklch(0.32 0.008 270);
        --accent-foreground: oklch(0.98 0.005 270);
        --destructive: oklch(0.62 0.2 25);
        --destructive-foreground: oklch(0.98 0.005 270);
        --border: oklch(1 0 0 / 8%);
        --input: oklch(1 0 0 / 12%);
        --ring: oklch(0.7 0.01 270 / 50%);
        --glass: oklch(0.22 0.006 270 / 0.32);
        --glass-strong: oklch(0.18 0.005 270 / 0.55);

        --font-interface: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        --font-mail-preview: "Space Grotesk", var(--font-interface);
      }

      /* ── Reset & base ──────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        border-color: oklch(1 0 0 / 8%);
        margin: 0;
        padding: 0;
      }

      html,
      body,
      #root {
        height: 100%;
      }

      body {
        background: var(--background);
        color: var(--foreground);
        font-family: var(--font-interface);
        font-feature-settings: "cv11", "ss01", "ss03";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── Accessibility utility ─────────────────────────────────────────── */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }

      /* ── Focus ring (mirrors .glow-ring from interactions.css) ────────── */
      .glow-ring:focus-visible {
        outline: none;
        box-shadow:
          0 0 0 2px oklch(1 0 0 / 0.2),
          0 0 24px oklch(1 0 0 / 0.08);
      }

      /* ── Thin scrollbar ─────────────────────────────────────────────────── */
      * {
        scrollbar-color: oklch(1 0 0 / 0.12) transparent;
        scrollbar-width: thin;
      }

      /* ── Reduced motion ─────────────────────────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* ── Tool animations ────────────────────────────────────────────────── */
      @keyframes vmt-shimmer {
        0%, 100% { opacity: 0.5; }
        50%       { opacity: 1;   }
      }

      @keyframes vmt-toast-in {
        from { opacity: 0; transform: translateY(12px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0)    scale(1);    }
      }

      @keyframes vmt-fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        @keyframes vmt-shimmer  { 0%, 100% { opacity: 0.6; } }
        @keyframes vmt-toast-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes vmt-fade-in  { from { opacity: 0; } to { opacity: 1; } }
        #vmt-detail-panel { transition: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./preview.entry.tsx"></script>
  </body>
</html>
